<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rujak.Co – Content Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --g: #0F4D37; --gd: #0a3a2a; --gl: #1a6b4e; --gp: #EAF2EE;
      --r: #D62828; --gold: #F4C430; --ivory: #FDFDF8;
      --g2: #E5E7EB; --g4: #9CA3AF; --g5: #6B7280; --g7: #374151; --g9: #111827;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #1a1a1a; min-height: 100vh; color: var(--g9); }
    .app { max-width: 520px; margin: 0 auto; min-height: 100vh; background: #EFEFE9; display: flex; flex-direction: column; }
    .hdr { background: var(--g); padding: 16px 20px 14px; position: sticky; top: 0; z-index: 50; }
    .hdr-brand { display: flex; align-items: center; gap: 8px; }
    .hdr-brand img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    .hdr-title { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 800; color: white; }
    .hdr-title span { color: var(--gold); }
    .hdr-sub { font-size: 11px; color: rgba(255,255,255,.6); font-weight: 500; margin-top: 2px; }
    .tabs { display: flex; background: white; border-bottom: 1px solid var(--g2); }
    .tab { flex: 1; padding: 11px; font-size: 12px; font-weight: 700; color: var(--g5); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; font-family: inherit; }
    .tab.active { color: var(--g); border-bottom-color: var(--g); }
    .panel { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .panel[hidden] { display: none; }
    .slbl { font-size: 10px; font-weight: 800; color: var(--g5); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 7px; }
    .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pcard { border: 2px solid var(--g2); border-radius: 14px; cursor: pointer; transition: all .18s; background: white; position: relative; overflow: hidden; text-align: left; font-family: inherit; padding: 0; }
    .pcard:hover { border-color: #aac9bb; }
    .pcard.sel { border-color: var(--g); box-shadow: 0 0 0 3px rgba(15,77,55,.12); }
    .pcard-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: flex; align-items: center; justify-content: center; background: #e8efeb; }
    .pcard-body { padding: 8px 9px 9px; }
    .pcard-name { font-size: 12px; font-weight: 700; color: var(--g9); line-height: 1.3; }
    .pcard-price { font-size: 11px; font-weight: 700; color: var(--g); margin-top: 2px; }
    .pcard-badge { position: absolute; top: 7px; left: 7px; font-size: 8.5px; font-weight: 800; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; letter-spacing: .03em; }
    .br { background: var(--r); color: white; }
    .bg { background: #111; color: var(--gold); }
    .pcard-chk { position: absolute; top: 7px; right: 7px; width: 20px; height: 20px; background: var(--g); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 11px; color: white; font-weight: 800; }
    .pcard.sel .pcard-chk { display: flex; }
    .pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .pill { border: 1.5px solid var(--g2); background: white; color: var(--g7); font-size: 12px; font-weight: 600; padding: 6px 13px; border-radius: 100px; cursor: pointer; transition: all .15s; font-family: inherit; white-space: nowrap; }
    .pill.active { background: var(--g); border-color: var(--g); color: white; }
    .tpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tpl-card { border: 2px solid var(--g2); border-radius: 12px; padding: 0; cursor: pointer; background: white; transition: all .18s; overflow: hidden; font-family: inherit; }
    .tpl-card.active { border-color: var(--g); box-shadow: 0 0 0 3px rgba(15,77,55,.12); }
    .tpl-preview { height: 72px; position: relative; overflow: hidden; }
    .tpl-label { padding: 7px 10px; font-size: 11px; font-weight: 700; color: var(--g9); }
    .tpl-sub { font-size: 10px; color: var(--g5); font-weight: 500; }
    .pfm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .pfm-btn { border: 1.5px solid var(--g2); background: white; border-radius: 10px; padding: 8px 10px; cursor: pointer; transition: all .15s; font-family: inherit; display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; color: var(--g7); }
    .pfm-btn.active { background: var(--g); border-color: var(--g); color: white; }
    .genbtn { width: 100%; background: var(--g); color: white; border: none; border-radius: 13px; padding: 15px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .genbtn:hover { background: var(--gd); }
    .genbtn:active { transform: scale(.98); }
    .genbtn:disabled { background: var(--g4); cursor: not-allowed; }
    .output-wrap { display: flex; flex-direction: column; gap: 10px; }
    .output-header { display: flex; align-items: center; justify-content: space-between; }
    .output-title { font-size: 11px; font-weight: 800; color: var(--g5); text-transform: uppercase; letter-spacing: .06em; }
    .output-acts { display: flex; gap: 6px; }
    .act-btn { border: 1.5px solid var(--g2); background: white; color: var(--g); font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: 5px; }
    .act-btn:hover { background: var(--g); color: white; border-color: var(--g); }
    .act-btn.dl { background: var(--g); color: white; border-color: var(--g); }
    .card-canvas-wrap { border-radius: 16px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
    .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 40px 20px; }
    .spin { width: 32px; height: 32px; border: 3px solid var(--gp); border-top-color: var(--g); border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 13px; color: var(--g5); font-weight: 500; text-align: center; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px); background: #111; color: white; font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: 100px; opacity: 0; transition: all .25s; z-index: 999; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .hist-item { background: white; border: 1px solid var(--g2); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
    .hist-thumb { width: 100%; aspect-ratio: 4/2; object-fit: cover; display: block; background: #e8efeb; }
    .hist-body { padding: 10px 12px; }
    .hist-meta { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
    .hist-tag { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; background: var(--gp); color: var(--g); }
    .hist-acts { display: flex; gap: 6px; margin-top: 8px; }
    .sm-btn { border: 1px solid var(--g2); background: white; color: var(--g7); font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 7px; cursor: pointer; font-family: inherit; }
    .clr-btn { border: none; background: none; color: var(--r); font-size: 11px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .empty-hist { text-align: center; padding: 48px 20px; color: var(--g4); }
    .vc-wrap { position: fixed; left: -9999px; top: -9999px; width: 1080px; z-index: -1; }
    .range-group { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .range-group input[type=range] { flex: 1; }
    .range-label { font-size: 10px; font-weight: 600; color: var(--g5); min-width: 36px; }
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-brand">
      <img src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" alt="Rujak.Co" onerror="this.style.display='none'">
      <div>
        <div class="hdr-title">Rujak<span>.Co</span> Studio</div>
        <div class="hdr-sub">Visual Content Generator</div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="gen">🪄 Buat Konten</button>
    <button class="tab" data-tab="hist">🗂 Riwayat</button>
  </div>
  <div class="panel" id="panel-gen">
    <div><div class="slbl">Pilih Produk</div><div class="pgrid" id="pgrid"></div></div>
    <div><div class="slbl">Template Visual</div><div class="tpl-grid" id="tplGrid"></div></div>
    <div><div class="slbl">Platform</div><div class="pfm-grid" id="pfmGrid"></div></div>
    <div><div class="slbl">Tone Copywriting</div><div class="pills" id="tonePills"></div></div>
    <div id="imgControls" style="display:none;">
      <div class="slbl">Atur Posisi & Zoom Gambar</div>
      <div class="range-group">
        <span class="range-label">↔️ X</span>
        <input type="range" id="posX" min="-100" max="100" value="0" oninput="updateLivePreview()">
        <span class="range-label" id="valX">0%</span>
      </div>
      <div class="range-group">
        <span class="range-label">↕️ Y</span>
        <input type="range" id="posY" min="-100" max="100" value="0" oninput="updateLivePreview()">
        <span class="range-label" id="valY">0%</span>
      </div>
      <div class="range-group">
        <span class="range-label">🔍 Zoom</span>
        <input type="range" id="zoomLvl" min="100" max="200" value="120" oninput="updateLivePreview()">
        <span class="range-label" id="valZoom">120%</span>
      </div>
      <div style="border:2px dashed var(--g2); border-radius:12px; overflow:hidden; margin-top:8px;">
        <div id="livePreview" style="width:100%; aspect-ratio:9/16; background:#0F4D37; position:relative; overflow:hidden;"></div>
      </div>
    </div>
    <button class="genbtn" id="genBtn" disabled><span>🪄</span><span id="genTxt">Pilih produk dulu</span></button>
    <div id="outputArea"></div>
  </div>
  <div class="panel" id="panel-hist" hidden>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div class="slbl" style="margin:0;">Konten Tersimpan</div>
      <button class="clr-btn" id="clrHist">Hapus Semua</button>
    </div>
    <div id="histList"></div>
  </div>
</div>
<div class="vc-wrap" id="vcWrap"></div>
<div class="toast" id="toast"></div>

<script>
  (function() {
    const IMAGE_PROXY = "https://ghhnnfrmftttptcejizp.supabase.co/functions/v1/smart-api";
    function proxyUrl(url) { return IMAGE_PROXY + "?url=" + encodeURIComponent(url); }

    const PRODUCTS = [
      { id:'p_m1', name:'Rujak Segar', price:28000, cat:'classic', buah:['Mangga Muda','Nanas','Bengkoang','Jambu Air','Kedondong'], sambal:'Sambal Original', desc:'Ringan, segar, dan cocok untuk semua penikmat rujak.', portion:'1 Orang', thumb:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-segar-thumb.webp', hd:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-segar-hd.webp', badge:null, bc:null },
      { id:'p_m2', name:'Rujak Serut', price:26000, cat:'classic', buah:['Mangga Muda','Bengkoang','Nanas','Ubi Merah'], sambal:'Sambal Original', desc:'Buah diserut halus, menyatu sempurna di setiap suapan.', portion:'1 Orang', thumb:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-serut-thumb.webp', hd:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-serut-hd.webp', badge:null, bc:null },
      { id:'p_m3', name:'Rujak Gaco', price:40000, cat:'signature', buah:['Jambu Kristal','Mangga Muda','Nanas','Bengkoang','Jambu Air','Kedondong'], sambal:'Sambal Mete Premium', desc:'Favorit pelanggan. Enam buah pilihan, sambal mete yang kaya rasa.', portion:'1 Orang', thumb:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-gaco-thumb.webp', hd:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-gaco-hd.webp', badge:'Koleksi Favorit', bc:'r' },
      { id:'p_m4', name:'Rujak Rama', price:48000, cat:'signature', buah:['Jambu Kristal','Mangga Muda','Nanas','Bengkoang','Jambu Air','Kedondong'], sambal:'Sambal Mete Premium', desc:'Porsi melimpah untuk dua hingga tiga orang.', portion:'2–3 Orang', thumb:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-rama-thumb.webp', hd:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-rama-hd.webp', badge:'Untuk Dibagi', bc:'r' },
      { id:'p_m5', name:'Rujak Mahkota', price:85000, cat:'reserve', buah:['Shine Muscat','Jambu Kristal','Mangga Muda','Nanas','Bengkoang','Jambu Air','Kedondong'], sambal:'Sambal Mete Premium', desc:'Koleksi premium dengan Shine Muscat untuk momen istimewa.', portion:'1–2 Orang', thumb:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-mahkota-thumb.webp', hd:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/rujak-mahkota-hd.webp', badge:'Reserve Collection', bc:'g' },
      { id:'p_m6', name:'Tampah Nusantara', price:200000, cat:'reserve', buah:['Shine Muscat','Jambu Kristal','Mangga Muda','Nanas','Bengkoang','Jambu Air','Kedondong','Ubi Merah'], sambal:'Sambal Original & Mete', desc:'Sajian kebersamaan dalam tampah bambu untuk momen yang tak terlupakan.', portion:'8–10 Orang', thumb:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/tampah-nusantara-thumb.webp', hd:'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/tampah-nusantara-hd.webp', badge:'8–10 Orang', bc:'g' }
    ];
    const LOGO = 'https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp';
    const fmt = n => 'Rp' + n.toLocaleString('id-ID');

    const S = {
      pid: null, tpl: 'story-dark', pfm: 'instagram', tone: 'santai',
      imgX: 0, imgY: 0, imgZoom: 120,
      history: JSON.parse(localStorage.getItem('rcg_hist') || '[]')
    };

    // ─── COPYWRITING ────────────────────────────────────────
    function generateCopy(prod) {
      const tone = S.tone, pfm = S.pfm;
      const headlineMap = {
        santai: [`Rujak ${prod.name.split(' ')[1] || 'Segar'}`, `Kesegaran ${prod.name}`, `Nikmati Sensasi Rujak`, `Rujak Premium ${prod.name}`],
        hype: [`GILA! ${prod.name} 🔥`, `WAJIB COBA ${prod.name}`, `${prod.name} BOMBASTIS!`, `INI DIA ${prod.name}`],
        aesthetic: [`Simfoni Buah Segar`, `Elegansi ${prod.name}`, `Puisi dalam Wadah`, `Mahakarya Rujak`],
        formal: [`Nikmati ${prod.name}`, `Kualitas Premium ${prod.name}`, `${prod.name} dari Rujak.Co`, `Sajian ${prod.name} Istimewa`],
        lucu: [`Ngiler Dulu 😋`, `Buahnya Bikin Lupa Diri`, `Rujak Bikin Baper`, `Jangan Nangis ${prod.name}`]
      };
      const sublineMap = {
        santai: [`Cocok buat nemenin santai sore kamu yang butuh kesegaran ekstra.`, `Segar, ringan, dan bikin mood langsung naik.`, `Dijamin bikin kamu ketagihan di suapan pertama.`],
        hype: [`BURUAN SEBELUM KEHABISAN! STOK TERBATAS!`, `Level pedasnya bikin jantung deg-degan tapi nagih!`, `RASA JUARA YANG GAK ADA DUANYA!`],
        aesthetic: [`Perpaduan rasa dan tekstur yang menari di langit-langit mulut.`, `Setiap gigitan adalah perjalanan rasa yang intim.`, `Dibuat dengan ketelitian untuk mereka yang menghargai keindahan.`],
        formal: [`Dikurasi dari buah segar pilihan dengan standar kualitas Rujak.Co.`, `Pengalaman rujak premium yang memadukan cita rasa dan higienitas.`, `Persembahan untuk setiap momen berharga Anda.`],
        lucu: [`Pedas? Tenang, ada buahnya kok... banyak malah.`, `Satu gigitan, semua masalah ilang (sementara).`, `Warning: bisa bikin kamu senyum sendiri.`]
      };
      const bodyMap = {
        santai: [`${prod.desc} Sambal ${prod.sambal.toLowerCase()} yang khas bikin setiap gigitan makin mantap. Cocok buat kamu yang lagi pengen ngemil sehat dan segar.`, `Dengan ${prod.buah.slice(0,3).join(', ')} dan buah segar lainnya, ${prod.name} siap jadi camilan favoritmu. Pesan sekarang, dijamin puas!`],
        hype: [`${prod.desc} Dengan ${prod.buah.length} buah pilihan dan sambal ${prod.sambal.toLowerCase()} yang LEGENDARIS! Jangan sampe nyesel gak nyobain!`, `STOK TERBATAS! ${prod.name} adalah definisi rujak premium yang bikin kamu ketagihan. Buruan order sebelum sold out!`],
        aesthetic: [`${prod.desc} Setiap elemen—dari ${prod.buah.slice(0,2).join(', ')} hingga ${prod.buah.slice(-2).join(', ')}—dipilih dengan saksama untuk menciptakan harmoni rasa yang sempurna.`, `Lebih dari sekadar rujak. ${prod.name} adalah pengalaman sensori yang dirancang untuk mereka yang menghargai keindahan dalam setiap detail.`],
        formal: [`${prod.desc} Disajikan dengan sambal ${prod.sambal.toLowerCase()} dalam kemasan higienis, siap dikirim ke area Jabodetabek. Hubungi kami sekarang.`, `Komposisi buah terbaik musim ini, diracik dengan sambal kacang premium. ${prod.name} adalah pilihan tepat untuk konsumsi pribadi maupun acara.`],
        lucu: [`${prod.desc} Sambalnya nampol, buahnya seger, dompetnya? Tenang, masih aman. Ngemil rujak gak perlu nunggu gajian.`, `Dari semua drama hidup, ${prod.name} adalah satu-satunya yang bikin kamu happy. Pedesnya pas, manisnya alami, pokoknya TOP!`]
      };
      const ctaMap = {
        santai: ['Pesan Sekarang', 'Order Yuk!', 'Coba Sekarang'],
        hype: ['ORDER SEKARANG!', 'GASKEUN!', 'BELI SEKARANG!'],
        aesthetic: ['Jelajahi Rasa', 'Pesan dengan Gaya', 'Rasakan Keindahan'],
        formal: ['Hubungi Kami', 'Pesan di Sini', 'Kontak Kami'],
        lucu: ['Ngiler? Pesan Aja!', 'Klik Buat Ngemil', 'Lapar? Gas!']
      };
      const hashtagMap = {
        instagram: ['#RujakCo', '#RujakPremium', '#KulinerIndonesia', '#RujakJabodetabek', '#MakanEnak', '#RekomendasiMakanan', '#PedasSegar'],
        tiktok: ['#RujakCo', '#RujakPremium', '#FYP', '#MakananViral', '#RujakIndonesia', '#KulinerTikTok'],
        threads: ['#RujakCo', '#RujakPremium', '#FoodPhotography', '#KulinerNusantara'],
        whatsapp: ['#RujakCo', '#RujakPremium', '#InfoPemesanan']
      };
      const pick = arr => arr[Math.floor(Math.random() * arr.length)];
      const headline = pick(headlineMap[tone] || headlineMap.santai);
      const subline = pick(sublineMap[tone] || sublineMap.santai);
      const body = pick(bodyMap[tone] || bodyMap.santai);
      const cta = pick(ctaMap[tone] || ctaMap.santai);
      const hashtags = (hashtagMap[pfm] || hashtagMap.instagram).join(' ');
      const caption = `${headline}\n\n${subline}\n\n${body}\n\n🚀 ${cta}: https://rujakco.vercel.app\n\n${hashtags}`;
      return { HEADLINE: headline, SUBLINE: subline, BODY: body, CTA: cta, HASHTAGS: hashtags, CAPTION: caption };
    }

    // ─── RENDER PRODUK ──────────────────────────────────────
    function renderProducts() {
      document.getElementById('pgrid').innerHTML = PRODUCTS.map(p => `
        <button class="pcard${S.pid===p.id?' sel':''}" onclick="selProd('${p.id}')">
          ${p.badge?`<div class="pcard-badge b${p.bc}">${p.badge}</div>`:''}
          <div class="pcard-chk">✓</div>
          <img class="pcard-img" src="${p.thumb}" alt="${p.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="pcard-img" style="display:none;background:linear-gradient(135deg,#e8efeb,#d4e8de);align-items:center;justify-content:center;font-size:40px;">🥭</div>
          <div class="pcard-body"><div class="pcard-name">${p.name}</div><div class="pcard-price">${fmt(p.price)}</div></div>
        </button>`).join('');
    }
    window.selProd = function(id) { S.pid = S.pid===id ? null : id; renderProducts(); updBtn(); showImgControls(); };
    function updBtn() {
      const btn = document.getElementById('genBtn'), txt = document.getElementById('genTxt');
      btn.disabled = !S.pid; txt.textContent = S.pid ? 'Buat Visual Konten' : 'Pilih produk dulu';
    }

    // ─── KONTROL GAMBAR ─────────────────────────────────────
    function showImgControls() {
      document.getElementById('imgControls').style.display = S.pid ? 'block' : 'none';
      if (S.pid) updateLivePreview();
    }

    // Fungsi bantu background style
    function bgCSS(url) {
      const z = S.imgZoom;
      const x = 50 + S.imgX;
      const y = 50 + S.imgY;
      return `background-image:url(${url});background-size:${z}%;background-position:${x}% ${y}%;background-repeat:no-repeat;`;
    }

    window.updateLivePreview = function() {
      S.imgX = parseInt(document.getElementById('posX').value);
      S.imgY = parseInt(document.getElementById('posY').value);
      S.imgZoom = parseInt(document.getElementById('zoomLvl').value);
      document.getElementById('valX').textContent = S.imgX + '%';
      document.getElementById('valY').textContent = S.imgY + '%';
      document.getElementById('valZoom').textContent = S.imgZoom + '%';
      if (!S.pid) return;
      const prod = PRODUCTS.find(p=>p.id===S.pid);
      const preview = document.getElementById('livePreview');
      preview.innerHTML = `<div style="position:absolute;inset:0;${bgCSS(proxyUrl(prod.hd))}"></div>`;
    };

    // ─── TEMPLATES ──────────────────────────────────────────
    function renderTemplates() {
      document.getElementById('tplGrid').innerHTML = [
        { tpl:'story-dark', name:'Story Dark', sub:'Dark green · 9:16', bg:'#0F4D37' },
        { tpl:'story-light', name:'Story Light', sub:'Ivory cream · 9:16', bg:'#FDFDF8' },
        { tpl:'feed-bold', name:'Feed Bold', sub:'Merah · 1:1', bg:'#D62828' },
        { tpl:'feed-editorial', name:'Editorial', sub:'Dark gold · 4:5', bg:'#111827' },
        { tpl:'magazine', name:'Magazine', sub:'Split layout · 1:1', bg:'#EAF2EE' },
        { tpl:'minimal', name:'Minimal', sub:'Clean white · 9:16', bg:'white' }
      ].map(t=>`<button class="tpl-card${S.tpl===t.tpl?' active':''}" data-tpl="${t.tpl}" onclick="selTpl('${t.tpl}')"><div class="tpl-preview" style="background:${t.bg};"></div><div class="tpl-label">${t.name}<div class="tpl-sub">${t.sub}</div></div></button>`).join('');
    }
    window.selTpl = function(tpl) { S.tpl = tpl; renderTemplates(); showImgControls(); };

    document.getElementById('pfmGrid').innerHTML = [
      { pfm:'instagram', label:'📸 Instagram Story/Feed' },
      { pfm:'tiktok', label:'🎵 TikTok' },
      { pfm:'threads', label:'🧵 Threads' },
      { pfm:'whatsapp', label:'💬 WhatsApp Status' }
    ].map(p=>`<button class="pfm-btn${S.pfm===p.pfm?' active':''}" data-pfm="${p.pfm}" onclick="selPfm('${p.pfm}')">${p.label}</button>`).join('');
    window.selPfm = function(pfm) { S.pfm = pfm; document.querySelectorAll('.pfm-btn').forEach(b=>b.classList.toggle('active', b.dataset.pfm===S.pfm)); };
    document.getElementById('tonePills').innerHTML = [
      { tone:'santai', label:'😊 Santai' },
      { tone:'hype', label:'🔥 Hype' },
      { tone:'aesthetic', label:'✨ Aesthetic' },
      { tone:'formal', label:'🤝 Formal' },
      { tone:'lucu', label:'😄 Receh' }
    ].map(t=>`<button class="pill${S.tone===t.tone?' active':''}" data-tone="${t.tone}" onclick="selTone('${t.tone}')">${t.label}</button>`).join('');
    window.selTone = function(tone) { S.tone = tone; document.querySelectorAll('#tonePills .pill').forEach(p=>p.classList.toggle('active', p.dataset.tone===S.tone)); };

    // ─── GENERATE ───────────────────────────────────────────
    document.getElementById('genBtn').addEventListener('click', async ()=>{
      if (!S.pid) return;
      const prod = PRODUCTS.find(p=>p.id===S.pid);
      const copy = generateCopy(prod);
      document.getElementById('outputArea').innerHTML = `<div class="loading-wrap"><div class="spin"></div><div class="loading-txt">Menyiapkan visual...</div></div>`;
      const wrap = document.getElementById('vcWrap');
      wrap.innerHTML = buildCardHTML(prod, copy);

      // Konversi gambar ke data URI, khususnya untuk background-image
      const imgs = wrap.querySelectorAll('img');
      for (const img of imgs) {
        try {
          const src = img.src;
          if (src.startsWith('data:')) continue;
          const blob = await fetch(src).then(r => r.blob());
          const dataUri = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });
          img.src = dataUri;
        } catch (e) {
          img.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><rect width="200" height="200" fill="#e8efeb"/><text x="100" y="110" text-anchor="middle" font-size="60">🥭</text></svg>');
        }
      }

      // Untuk template dengan background-image, kita ganti src-nya dengan data URI
      const bgDivs = wrap.querySelectorAll('[style*="background-image"]');
      for (const div of bgDivs) {
        const style = div.getAttribute('style');
        const urlMatch = style.match(/url\(([^)]+)\)/);
        if (urlMatch && urlMatch[1] && !urlMatch[1].startsWith('data:')) {
          try {
            const blob = await fetch(urlMatch[1]).then(r => r.blob());
            const dataUri = await new Promise((resolve) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
            div.setAttribute('style', style.replace(urlMatch[1], dataUri));
          } catch(e) {}
        }
      }

      await new Promise(r => setTimeout(r, 300));
      const el = wrap.firstElementChild;
      if (!el) return;
      html2canvas(el, { scale: 0.5, useCORS: true, allowTaint: false, backgroundColor: null, logging: false })
        .then(canvas => {
          const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
          showOutput(prod, copy, dataUrl);
          saveHistory(prod, copy, dataUrl);
          wrap.innerHTML = '';
        })
        .catch(() => { showOutputFallback(prod, copy); wrap.innerHTML = ''; });
    });

    function buildCardHTML(prod, copy) {
      const url = prod.hd, price = fmt(prod.price);
      const bg = (w, h) => `<div style="position:absolute;inset:0;${bgCSS(proxyUrl(url))}"></div>`;
      const tpls = {
        'story-dark': `<div style="width:1080px;height:1920px;position:relative;overflow:hidden;background:#0F4D37;font-family:'DM Sans',sans-serif;">
          ${bg(1080, 1920)}
          <div style="position:absolute;inset:0;background:linear-gradient(to bottom, transparent 0%, transparent 45%, rgba(10,30,20,0.4) 60%, rgba(5,15,10,0.8) 75%, rgba(0,0,0,0.97) 100%);"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;padding:80px 72px 100px;">
            <div style="font-family:'Playfair Display',serif;font-size:108px;font-weight:900;color:white;line-height:1.0;margin-bottom:24px;">${copy.HEADLINE}</div>
            <div style="font-size:38px;color:rgba(255,255,255,.75);margin-bottom:40px;font-style:italic;">${copy.SUBLINE}</div>
            <div style="display:flex;align-items:center;justify-content:space-between;"><div style="font-size:72px;font-weight:900;color:white;">${price}</div><div style="background:#F4C430;border-radius:20px;padding:28px 48px;font-size:28px;font-weight:800;color:#111;">${copy.CTA} →</div></div>
          </div></div>`,
        'feed-bold': `<div style="width:1080px;height:1080px;position:relative;overflow:hidden;background:#D62828;font-family:'DM Sans',sans-serif;">
          <div style="position:absolute;right:0;top:0;width:580px;height:100%;">${bg(580, 1080)}</div>
          <div style="position:absolute;inset:0;background:linear-gradient(to right,#D62828 0%,rgba(214,40,40,0) 60%);"></div>
          <div style="position:absolute;left:72px;top:60px;bottom:60px;width:500px;display:flex;flex-direction:column;justify-content:space-between;"><div><div style="font-family:'Playfair Display',serif;font-size:88px;font-weight:900;color:white;line-height:.95;margin-bottom:20px;">${copy.HEADLINE}</div><div style="font-size:28px;color:rgba(255,255,255,.8);margin-bottom:32px;">${copy.SUBLINE}</div></div><div><div style="font-size:56px;font-weight:900;color:white;margin-bottom:8px;">${price}</div><div style="background:white;color:#D62828;border-radius:14px;padding:20px 32px;font-size:22px;font-weight:800;width:fit-content;">${copy.CTA} →</div></div></div></div>`,
        'magazine': `<div style="width:1080px;height:1080px;display:flex;background:#FDFDF8;font-family:'DM Sans',sans-serif;">
          <div style="width:460px;height:100%;position:relative;overflow:hidden;">${bg(460, 1080)}</div>
          <div style="flex:1;padding:64px;display:flex;flex-direction:column;justify-content:space-between;"><div><div style="font-family:'Playfair Display',serif;font-size:80px;font-weight:900;color:#0F4D37;line-height:.95;margin-bottom:20px;">${prod.name}</div><div style="font-family:'Playfair Display',serif;font-size:28px;font-style:italic;color:#374151;margin-bottom:20px;">"${copy.HEADLINE}"</div><div style="font-size:20px;color:#6B7280;line-height:1.6;">${copy.SUBLINE}</div></div><div style="display:flex;align-items:center;gap:16px;border-top:1.5px solid #E5E7EB;padding-top:28px;"><div style="font-size:64px;font-weight:900;color:#0F4D37;">${price}</div><div style="background:#0F4D37;color:white;border-radius:12px;padding:16px 28px;font-size:18px;font-weight:800;white-space:nowrap;">${copy.CTA} →</div></div></div></div>`,
        'story-light': `<div style="width:1080px;height:1920px;position:relative;overflow:hidden;background:#FDFDF8;font-family:'DM Sans',sans-serif;">
          <div style="position:absolute;top:0;left:0;right:0;height:980px;overflow:hidden;"><img src="${proxyUrl(url)}" crossorigin="anonymous" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.src='${url}';"></div>
          <div style="position:absolute;top:0;left:0;right:0;height:980px;background:linear-gradient(to bottom,rgba(253,253,248,0) 50%,#FDFDF8 100%);"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;padding:40px 72px 100px;"><div style="font-family:'Playfair Display',serif;font-size:96px;font-weight:900;color:#0F4D37;line-height:.95;margin-bottom:24px;">${prod.name}</div><div style="font-family:'Playfair Display',serif;font-size:52px;font-weight:700;font-style:italic;color:#111;margin-bottom:20px;">"${copy.SUBLINE}"</div><div style="font-size:30px;color:#6B7280;line-height:1.6;margin-bottom:44px;">${copy.BODY}</div><div style="display:flex;align-items:center;justify-content:space-between;border-top:2px solid #E5E7EB;padding-top:36px;"><div style="font-size:64px;font-weight:900;color:#0F4D37;">${price}</div><div style="background:#D62828;color:white;border-radius:16px;padding:24px 40px;font-size:24px;font-weight:800;">${copy.CTA} →</div></div></div></div>`,
        'feed-editorial': `<div style="width:1080px;height:1350px;position:relative;overflow:hidden;background:#111827;font-family:'DM Sans',sans-serif;">
          <div style="position:absolute;inset:0;overflow:hidden;opacity:.35;"><img src="${proxyUrl(url)}" crossorigin="anonymous" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.src='${url}';"></div>
          <div style="position:absolute;inset:0;background:linear-gradient(160deg,rgba(17,24,39,.3) 0%,rgba(17,24,39,.95) 55%);"></div>
          <div style="position:absolute;bottom:80px;left:80px;right:80px;"><div style="width:48px;height:4px;background:#F4C430;margin-bottom:28px;"></div><div style="font-family:'Playfair Display',serif;font-size:110px;font-weight:900;color:white;line-height:.9;margin-bottom:28px;">${copy.HEADLINE}</div><div style="font-family:'Playfair Display',serif;font-size:40px;font-style:italic;color:#F4C430;margin-bottom:28px;">"${copy.SUBLINE}"</div><div style="font-size:26px;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:48px;">${copy.BODY}</div><div style="display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.1);padding-top:32px;"><div style="font-size:64px;font-weight:900;color:white;">${price}</div><div style="background:#F4C430;color:#111;border-radius:12px;padding:20px 36px;font-size:22px;font-weight:800;">${copy.CTA}</div></div></div></div>`,
        'minimal': `<div style="width:1080px;height:1920px;position:relative;overflow:hidden;background:white;font-family:'DM Sans',sans-serif;">
          <div style="position:absolute;top:0;left:0;right:0;height:1080px;overflow:hidden;"><img src="${proxyUrl(url)}" crossorigin="anonymous" style="width:100%;height:100%;object-fit:cover;" onerror="this.onerror=null;this.src='${url}';"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;top:960px;background:white;border-radius:32px 32px 0 0;padding:56px 64px 80px;display:flex;flex-direction:column;justify-content:space-between;"><div><div style="font-family:'Playfair Display',serif;font-size:96px;font-weight:900;color:#111;line-height:.9;margin-bottom:16px;">${copy.HEADLINE}</div><div style="font-size:30px;color:#6B7280;font-style:italic;margin-bottom:28px;">${copy.SUBLINE}</div><div style="font-size:24px;color:#374151;line-height:1.6;margin-bottom:32px;">${copy.BODY}</div></div><div style="display:flex;align-items:center;justify-content:space-between;"><div style="font-size:64px;font-weight:900;color:#0F4D37;">${price}</div><div style="background:#111;color:white;border-radius:14px;padding:22px 44px;font-size:22px;font-weight:800;">${copy.CTA} →</div></div></div></div>`
      };
      return tpls[S.tpl] || tpls['story-dark'];
    }

    // ─── OUTPUT ─────────────────────────────────────────────
    function showOutput(prod, copy, imgData) {
      document.getElementById('outputArea').innerHTML = `
        <div class="output-wrap">
          <div class="output-header"><div class="output-title">✨ Visual Siap</div>
            <div class="output-acts"><button class="act-btn" onclick="copyCaption('${escA(copy.CAPTION)}')">📋 Salin Caption</button><button class="act-btn dl" onclick="dlImg('${imgData}','${prod.name}')">⬇ Download</button></div></div>
          <div class="card-canvas-wrap"><img src="${imgData}" style="width:100%;display:block;" alt="Visual ${prod.name}"></div>
          <div style="background:white;border:1.5px solid var(--g2);border-radius:12px;overflow:hidden;">
            <div style="padding:10px 14px;background:var(--gp);font-size:10px;font-weight:800;color:var(--g);text-transform:uppercase;">Caption ${S.pfm}</div>
            <div style="padding:14px;font-size:13px;color:var(--g7);line-height:1.7;white-space:pre-wrap;">${escH(copy.CAPTION)}</div>
            <div style="padding:0 14px 14px;"><button class="act-btn" style="width:100%;justify-content:center;" onclick="copyCaption('${escA(copy.CAPTION)}')">📋 Salin Caption + Hashtag</button></div>
          </div></div>`;
    }
    function showOutputFallback(prod, copy) {
      document.getElementById('outputArea').innerHTML = `<div class="output-wrap"><div style="padding:20px;background:white;border:1.5px solid var(--g2);border-radius:12px;"><div style="font-size:12px;color:var(--g5);margin-bottom:12px;">⚠️ Preview tidak bisa dimuat. Caption tetap bisa disalin.</div><div style="font-size:13px;color:var(--g7);line-height:1.7;white-space:pre-wrap;">${escH(copy.CAPTION)}</div><button class="act-btn" style="margin-top:12px;" onclick="copyCaption('${escA(copy.CAPTION)}')">📋 Salin Caption</button></div></div>`;
    }

    window.dlImg = function(dataUrl, name) {
      const a = document.createElement('a'); a.href = dataUrl; a.download = `rujakco-${name.replace(/\s+/g,'-').toLowerCase()}-${Date.now()}.jpg`; a.click();
      toast('🎉 Gambar berhasil didownload!');
    };
    window.copyCaption = function(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(()=>toast('✅ Caption disalin!')).catch(()=>fallbackCopy(text));
      } else { fallbackCopy(text); }
    };
    function fallbackCopy(text) {
      const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('✅ Caption disalin!');
    }
    function saveHistory(prod, copy, imgData) {
      S.history.unshift({ id:Date.now(), prodName:prod.name, tpl:S.tpl, pfm:S.pfm, caption:copy.CAPTION, img:imgData, ts:new Date().toLocaleString('id-ID',{dateStyle:'short',timeStyle:'short'}) });
      if (S.history.length > 15) S.history.pop();
      try { localStorage.setItem('rcg_hist', JSON.stringify(S.history)); } catch(e) {}
    }

    function renderHistory() {
      const list = document.getElementById('histList');
      if (!S.history.length) { list.innerHTML = `<div class="empty-hist"><div class="e">📭</div><div>Belum ada konten tersimpan.</div></div>`; return; }
      list.innerHTML = S.history.map(h=>`<div class="hist-item">${h.img?`<img class="hist-thumb" src="${h.img}" alt="${h.prodName}"/>`:''}<div class="hist-body"><div class="hist-meta"><span class="hist-tag">${h.prodName}</span><span class="hist-tag">${h.tpl}</span><span class="hist-tag">${h.pfm}</span></div><div class="hist-acts"><button class="sm-btn" onclick="copyCaption('${escA(h.caption)}')">📋 Salin</button>${h.img?`<button class="sm-btn" onclick="dlImg('${h.img}','${h.prodName}')">⬇ Download</button>`:''}</div></div></div>`).join('');
    }

    document.getElementById('clrHist').addEventListener('click',()=>{
      if (!S.history.length) return;
      if (confirm('Hapus semua riwayat?')) { S.history=[]; try{localStorage.removeItem('rcg_hist');}catch(e){} renderHistory(); toast('Riwayat dihapus'); }
    });

    document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      const w = t.dataset.tab;
      document.getElementById('panel-gen').hidden = w!=='gen';
      document.getElementById('panel-hist').hidden = w!=='hist';
      if(w==='hist') renderHistory();
    }));

    let _tt;
    function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg;el.classList.add('show'); clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2500); }
    function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
    function escA(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}

    renderProducts(); renderTemplates(); updBtn();
  })();
</script>
</body>
</html>
