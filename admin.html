<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Rujak.Co</title>
  <link rel="manifest" href="/admin-manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f5f5; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    h2 { color: #0F4D37; margin: 20px 0; display: flex; align-items: center; gap: 8px; }
    .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .nav-tab { padding: 10px 20px; border: none; background: #e5e7eb; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .nav-tab.active { background: #0F4D37; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .order, .product-item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .order-header, .product-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 4px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-active { background: #d1fae5; color: #065f46; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; margin-top: 8px; }
    .btn-primary { background: #0F4D37; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-edit { background: #f59e0b; color: white; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 13px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-family: inherit; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .loading { text-align: center; color: #9ca3af; padding: 20px; }
    .empty { text-align: center; color: #9ca3af; padding: 40px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0F4D37; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 700; z-index: 999; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    #productModal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; padding:20px; }
    #productModal .modal-content { background:white; border-radius:16px; padding:24px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; }
    .studio-iframe, .buku-iframe { width: 100%; height: 80vh; border: 1px solid #e5e7eb; border-radius: 12px; }
    .login-box { max-width:400px; margin:100px auto; background:white; padding:40px; border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    .login-box h2 { color:#0F4D37; margin-bottom:8px; }
    .login-box p { color:#6B7280; font-size:14px; margin-bottom:24px; }
    .login-box input { width:100%; padding:10px 12px; border:1px solid #D1D5DB; border-radius:8px; font-size:14px; margin-bottom:12px; }
    .login-box button { width:100%; background:#0F4D37; color:white; border:none; padding:12px; border-radius:8px; font-weight:700; font-size:16px; cursor:pointer; }
    .login-box button:hover { background: #0a3a2a; }
    .login-box .error { color:#D62828; font-size:13px; margin-top:12px; display:none; }
    @media (max-width: 480px) {
      .two-col { grid-template-columns: 1fr; }
      .nav-tabs { gap: 6px; }
      .nav-tab { font-size: 12px; padding: 8px 14px; }
    }
  </style>
</head>
<body>
  <div id="appContainer"></div>
  <div class="toast" id="toastNotif">🔔 Pesanan baru masuk!</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function() {
      const SUPABASE_URL = "https://ghhnnfrmftttptcejizp.supabase.co";
      const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoaG5uZnJtZnR0dHB0Y2VqaXpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNjA1ODksImV4cCI6MjA5NzgzNjU4OX0.FM-sPvJJzviX2kA0GEHnznOppivm4JNyC4IPFv_RkdE";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // ===================== AUTH =====================
      async function checkAdminAuth() {
        if (sessionStorage.getItem('admin_auth') === 'true') return true;

        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          const { data: adminData, error } = await supabase
            .from('admin_users')
            .select('*')
            .eq('id', session.user.id)
            .single();
          if (!error && adminData) {
            sessionStorage.setItem('admin_auth', 'true');
            return true;
          }
        }
        showLoginForm();
        return false;
      }

      function showLoginForm() {
        document.getElementById('appContainer').innerHTML = `
          <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <p>Masuk untuk mengelola pesanan & produk.</p>
            <form id="adminLoginForm">
              <label style="display:block;font-weight:600;font-size:13px;margin-bottom:4px;">Email</label>
              <input type="email" id="loginEmail" placeholder="admin@rujakco.com" required>
              <label style="display:block;font-weight:600;font-size:13px;margin-bottom:4px;">Password</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required>
              <button type="submit">🔓 Masuk</button>
              <div id="loginError" class="error"></div>
            </form>
          </div>
        `;

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('loginEmail').value;
          const password = document.getElementById('loginPassword').value;
          const errorEl = document.getElementById('loginError');
          errorEl.style.display = 'none';

          try {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { errorEl.textContent = '❌ ' + error.message; errorEl.style.display = 'block'; return; }

            const { data: adminData, error: adminError } = await supabase
              .from('admin_users')
              .select('*')
              .eq('id', data.user.id)
              .single();

            if (adminError || !adminData) {
              await supabase.auth.signOut();
              errorEl.textContent = '❌ Akun ini bukan admin.';
              errorEl.style.display = 'block';
              return;
            }

            sessionStorage.setItem('admin_auth', 'true');
            window.location.reload();
          } catch (err) {
            errorEl.textContent = '❌ Terjadi kesalahan, coba lagi.';
            errorEl.style.display = 'block';
          }
        });
      }

      // ===================== ADMIN PANEL =====================
      function initAdminPanel() {
        const container = document.getElementById('appContainer');
        container.innerHTML = `
          <div class="container">
            <h2>🛎️ Admin Panel — Rujak.Co</h2>
            <div class="nav-tabs">
              <button class="nav-tab active" onclick="switchTab('orders')">📦 Pesanan</button>
              <button class="nav-tab" onclick="switchTab('products')">🥭 Produk</button>
              <button class="nav-tab" onclick="switchTab('studio')">🎬 Studio</button>
              <button class="nav-tab" onclick="switchTab('bukumas')">📖 Buku Master</button>
            </div>

            <div id="tab-orders" class="tab-content active">
              <div id="orderList"><div class="loading">Memuat...</div></div>
              <button class="btn btn-primary" onclick="loadOrders()">🔄 Muat Ulang</button>
            </div>

            <div id="tab-products" class="tab-content">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:8px;">
                <strong>Daftar Produk</strong>
                <button class="btn btn-primary" onclick="showProductForm()">+ Tambah Produk</button>
              </div>
              <div id="productList"><div class="loading">Memuat...</div></div>
            </div>

            <div id="tab-studio" class="tab-content">
              <iframe src="/studio.html" class="studio-iframe" title="Studio"></iframe>
            </div>

            <div id="tab-bukumas" class="tab-content">
              <iframe src="https://raw.githubusercontent.com/rujakco/RujakCo/9c9f8b8f4ed260261f1d0f6dba9de68cb6f3fcee/assets/images/buku-master-rujakco.html" class="buku-iframe" title="Buku Master RujakCo"></iframe>
            </div>

            <div id="productModal">
              <div class="modal-content">
                <h3 id="productModalTitle">Tambah Produk</h3>
                <form id="productForm">
                  <input type="hidden" id="prodId">
                  <div class="form-group"><label>Nama</label><input type="text" id="prodName" required></div>
                  <div class="form-group"><label>Deskripsi</label><textarea id="prodDesc" rows="2"></textarea></div>
                  <div class="two-col">
                    <div class="form-group"><label>Harga</label><input type="number" id="prodPrice" required></div>
                    <div class="form-group"><label>Kategori</label><select id="prodCat"><option value="classic">Classic</option><option value="signature">Signature</option><option value="reserve">Reserve</option></select></div>
                  </div>
                  <div class="form-group"><label>Tags (pisahkan dengan koma)</label><input type="text" id="prodTags" placeholder="Bestseller, Pedas"></div>
                  <div class="form-group"><label>Buah (pisahkan dengan koma)</label><input type="text" id="prodBuah" placeholder="Mangga, Nanas"></div>
                  <div class="form-group"><label>Wadah</label><input type="text" id="prodContainer"></div>
                  <div class="form-group"><label>Ukuran</label><input type="text" id="prodSize"></div>
                  <div class="form-group"><label>Sambal</label><input type="text" id="prodSambal"></div>
                  <div class="form-group"><label>Flavor</label><input type="text" id="prodFlavor"></div>
                  <div class="form-group"><label>Level Pedas Default</label><input type="number" id="prodSpice" min="1" max="5" value="3"></div>
                  <div class="form-group"><label>Porsi</label><input type="text" id="prodPortion"></div>
                  <div class="form-group"><label>Thumbnail URL</label><input type="text" id="prodThumb"></div>
                  <div class="form-group"><label>Image URL</label><input type="text" id="prodImage"></div>
                  <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
                    <button type="submit" class="btn btn-primary">Simpan</button>
                    <button type="button" class="btn" onclick="closeProductForm()">Batal</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        `;

        // ===== GLOBAL FUNCTIONS =====
        window.switchTab = function(tab) {
          document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          const tabBtns = document.querySelectorAll('.nav-tab');
          if (tab === 'orders') tabBtns[0].classList.add('active');
          else if (tab === 'products') tabBtns[1].classList.add('active');
          else if (tab === 'studio') tabBtns[2].classList.add('active');
          else if (tab === 'bukumas') tabBtns[3].classList.add('active');
          document.getElementById(`tab-${tab}`).classList.add('active');
          if (tab === 'orders') window.loadOrders();
          else if (tab === 'products') window.loadProducts();
        };

        window.loadOrders = async function() {
          const container = document.getElementById('orderList');
          container.innerHTML = '<div class="loading">Memuat...</div>';
          try {
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            if (!data || data.length === 0) {
              container.innerHTML = '<div class="empty">📭 Belum ada pesanan.</div>';
              return;
            }
            container.innerHTML = data.map(o => `
              <div class="order">
                <div class="order-header">
                  <span class="order-name"><strong>${escapeHtml(o.customer_name)}</strong></span>
                  <span class="order-date" style="font-size:12px;color:#6b7280;">${new Date(o.created_at).toLocaleString('id-ID')}</span>
                </div>
                <div style="font-size:14px;color:#374151;margin:4px 0;">${(o.items || []).map(i => `<span>${escapeHtml(i.name)} x${i.qty}</span>`).join(' • ')}</div>
                <div style="font-size:13px;color:#6b7280;">📱 ${escapeHtml(o.customer_phone)} | 📍 ${escapeHtml(o.customer_address)}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px; flex-wrap:wrap; gap:4px;">
                  <span class="badge badge-pending">${o.status || 'pending'}</span>
                  <span style="font-size:12px; color:#6b7280;">Diskon: Rp${(o.discount||0).toLocaleString('id-ID')} | Ongkir: Rp${(o.shipping_cost||0).toLocaleString('id-ID')}</span>
                </div>
                <div style="font-size:18px;font-weight:800;color:#0F4D37;margin-top:4px;">Rp${o.total.toLocaleString('id-ID')}</div>
              </div>
            `).join('');
          } catch (err) {
            container.innerHTML = '<div class="empty">❌ Gagal memuat data.</div>';
            console.error(err);
          }
        };

        window.loadProducts = async function() {
          const container = document.getElementById('productList');
          container.innerHTML = '<div class="loading">Memuat...</div>';
          try {
            const { data, error } = await supabase.from('products').select('*').order('cat');
            if (error) throw error;
            if (!data || data.length === 0) {
              container.innerHTML = '<div class="empty">📭 Belum ada produk.</div>';
              return;
            }
            container.innerHTML = data.map(p => `
              <div class="product-item">
                <div class="product-header">
                  <span><strong>${escapeHtml(p.name)}</strong> (${p.cat}) — Rp${p.price.toLocaleString('id-ID')}</span>
                  <span class="badge ${p.is_active ? 'badge-active' : 'badge-inactive'}">${p.is_active ? 'Aktif' : 'Nonaktif'}</span>
                </div>
                <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
                  <button class="btn btn-edit" onclick="editProduct('${p.id}')">✏️ Edit</button>
                  <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">🗑️ Hapus</button>
                </div>
              </div>
            `).join('');
          } catch (err) {
            container.innerHTML = '<div class="empty">❌ Gagal memuat produk.</div>';
            console.error(err);
          }
        };

        window.showProductForm = function(id = null) {
          document.getElementById('productModal').style.display = 'flex';
          if (id) {
            supabase.from('products').select('*').eq('id', id).single().then(({ data }) => {
              if (!data) return;
              document.getElementById('prodId').value = data.id;
              document.getElementById('prodName').value = data.name || '';
              document.getElementById('prodDesc').value = data.desc || '';
              document.getElementById('prodPrice').value = data.price;
              document.getElementById('prodCat').value = data.cat;
              document.getElementById('prodTags').value = (data.tags || []).join(', ');
              document.getElementById('prodBuah').value = (data.buah || []).join(', ');
              document.getElementById('prodContainer').value = data.container || '';
              document.getElementById('prodSize').value = data.size || '';
              document.getElementById('prodSambal').value = data.sambal || '';
              document.getElementById('prodFlavor').value = data.flavor || '';
              document.getElementById('prodSpice').value = data.default_spice || 3;
              document.getElementById('prodPortion').value = data.portion || '';
              document.getElementById('prodThumb').value = data.thumbnail || '';
              document.getElementById('prodImage').value = data.image || '';
              document.getElementById('productModalTitle').textContent = 'Edit Produk';
            });
          } else {
            document.getElementById('productForm').reset();
            document.getElementById('prodId').value = '';
            document.getElementById('productModalTitle').textContent = 'Tambah Produk';
          }
        };

        window.closeProductForm = function() {
          document.getElementById('productModal').style.display = 'none';
        };

        document.getElementById('productForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const id = document.getElementById('prodId').value || 'p_' + Date.now();
          const payload = {
            id,
            name: document.getElementById('prodName').value,
            desc: document.getElementById('prodDesc').value,
            price: parseInt(document.getElementById('prodPrice').value),
            cat: document.getElementById('prodCat').value,
            tags: document.getElementById('prodTags').value.split(',').map(t => t.trim()).filter(Boolean),
            buah: document.getElementById('prodBuah').value.split(',').map(b => b.trim()).filter(Boolean),
            container: document.getElementById('prodContainer').value,
            size: document.getElementById('prodSize').value,
            sambal: document.getElementById('prodSambal').value,
            flavor: document.getElementById('prodFlavor').value,
            default_spice: parseInt(document.getElementById('prodSpice').value) || 3,
            portion: document.getElementById('prodPortion').value,
            thumbnail: document.getElementById('prodThumb').value,
            image: document.getElementById('prodImage').value,
            is_active: true
          };
          const { error } = await supabase.from('products').upsert(payload);
          if (error) { alert('Gagal menyimpan: ' + error.message); return; }
          closeProductForm();
          window.loadProducts();
          showToast('✅ Produk disimpan!');
        });

        window.editProduct = (id) => showProductForm(id);
        window.deleteProduct = async (id) => {
          if (!confirm('Yakin nonaktifkan produk ini?')) return;
          await supabase.from('products').update({ is_active: false }).eq('id', id);
          window.loadProducts();
          showToast('🗑️ Produk dinonaktifkan');
        };

        function escapeHtml(text) {
          if (!text) return '';
          const div = document.createElement('div');
          div.textContent = String(text);
          return div.innerHTML;
        }

        const toastNotif = document.getElementById('toastNotif');
        function showToast(msg) {
          toastNotif.textContent = msg;
          toastNotif.classList.add('show');
          setTimeout(() => toastNotif.classList.remove('show'), 3000);
        }

        // ===== REALTIME =====
        supabase.channel('orders-admin')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, payload => {
            showToast('🔔 Pesanan baru dari ' + payload.new.customer_name + '!');
            window.loadOrders();
          })
          .subscribe();

        if (Notification.permission !== "denied") Notification.requestPermission();

        window.loadOrders();
        window.loadProducts();
      }

      // ===================== START =====================
      checkAdminAuth().then(isAuth => {
        if (isAuth) initAdminPanel();
      });
    })();
  </script>
</body>
</html>
