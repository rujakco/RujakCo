<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Rujak.Co - Debug</title>
  <link rel="manifest" href="/admin-manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
    .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { padding: 10px 16px; background: #0F4D37; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .error { color: red; background: #fee; padding: 10px; border-radius: 8px; margin: 10px 0; }
    .success { color: green; background: #efe; padding: 10px; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h2>🔧 Debug Produk</h2>
  <button class="btn" onclick="cekKoneksi()">🔍 Tes Koneksi & Tampilkan Produk</button>
  <div id="status"></div>
  <div id="productList"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://ghhnnfrmftttptcejizp.supabase.co";
    const SERVICE_ROLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoaG5uZnJtZnR0dHB0Y2VqaXpwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjI2MDU4OSwiZXhwIjoyMDk3ODM2NTg5fQ.THg4A8pxUjKCdc6Cs7dhQwjgoHZDXBPGtej4-Krj1q4";
    const supabaseAdmin = window.supabase.createClient(SUPABASE_URL, SERVICE_ROLE_KEY);

    window.cekKoneksi = async function() {
      const statusDiv = document.getElementById('status');
      const listDiv = document.getElementById('productList');
      statusDiv.innerHTML = '⏳ Mengecek koneksi...';
      listDiv.innerHTML = '';

      try {
        // Coba ambil semua produk
        const { data, error } = await supabaseAdmin
          .from('products')
          .select('*')
          .order('cat');

        if (error) {
          statusDiv.innerHTML = `<div class="error">❌ Gagal query: ${error.message}</div>`;
          return;
        }

        if (!data || data.length === 0) {
          statusDiv.innerHTML = `<div class="success">✅ Koneksi OK, tapi tabel kosong.</div>`;
          return;
        }

        statusDiv.innerHTML = `<div class="success">✅ Berhasil! Ditemukan ${data.length} produk.</div>`;
        listDiv.innerHTML = data.map(p => `
          <div class="card">
            <strong>${p.name}</strong> (${p.cat})<br>
            💰 Rp${p.price.toLocaleString('id-ID')}<br>
            🏷️ ${(p.tags || []).join(', ')}<br>
            Aktif: ${p.is_active ? '✅' : '❌'}
          </div>
        `).join('');
      } catch (err) {
        statusDiv.innerHTML = `<div class="error">❌ Error jaringan: ${err.message}</div>`;
      }
    };
  </script>
</body>
</html>
