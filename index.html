<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rujak.Co</title>
  <meta name="description" content="Rujak premium, disajikan dengan kemewahan." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">

  <!-- HEADER — Hanya logo & status -->
  <header class="header">
    <span class="brand">Rujak<span>.Co</span></span>
    <div class="status">
      <span class="dot"></span>
      <span id="storeStatus">Buka</span>
    </div>
  </header>

  <!-- HERO — Gambar, judul besar, CTA tunggal -->
  <section class="hero">
    <img src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/Banner.webp" alt="Rujak" loading="lazy" />
    <h1>Asem, Pedes, <em>Manis, Seger.</em></h1>
    <p>Rujak premium dengan sambal mete terpisah — tetap renyah sampai tujuan.</p>
    <button class="btn-hero" data-scroll="products">Jelajahi</button>
  </section>

  <!-- PRODUK — Grid 2 kolom, card minimal -->
  <div class="section-label"><span>Koleksi</span></div>
  <div class="grid" id="productGrid"></div>

  <!-- ADD-ON — Horizontal scroll -->
  <div class="section-label"><span>Pelengkap</span></div>
  <div class="addon-scroll" id="addonScroll"></div>

  <!-- BOTTOM BAR — Keranjang (muncul hanya jika ada item) -->
  <div class="bottom-bar" id="bottomBar">
    <div>
      <span class="cart-count" id="cartCount">0</span>
      <span class="cart-total" id="cartTotal">Rp0</span>
    </div>
    <button id="checkoutBtn" class="btn-primary">Checkout</button>
  </div>

  <!-- DETAIL PRODUCT — Overlay dengan blur -->
  <div class="detail-overlay" id="detailModal">
    <div class="detail-sheet">
      <button class="detail-close" id="detailClose">✕</button>
      <img id="detailImg" src="" alt="" />
      <h2 id="detailName"></h2>
      <p id="detailPrice"></p>
      <button class="btn-primary" id="detailAddBtn">Tambahkan</button>
    </div>
  </div>

  <!-- CHECKOUT — Bottom sheet -->
  <div class="checkout-overlay" id="checkoutModal">
    <div class="checkout-sheet">
      <h2>Reservasi</h2>
      <div id="checkoutItems"></div>
      <div class="checkout-total" id="checkoutTotal"></div>
      <div class="form-group">
        <input type="text" id="custName" placeholder="Nama" />
      </div>
      <div class="form-group">
        <input type="tel" id="custPhone" placeholder="Telepon" />
      </div>
      <div class="form-group">
        <textarea id="custAddress" placeholder="Alamat" rows="2"></textarea>
      </div>
      <button class="btn-primary" id="confirmOrder">Kirim</button>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>
</div>

<script src="app.js"></script>
</body>
</html>
