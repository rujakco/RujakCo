      <!-- 1. Form Data Pelanggan (Dropdown/Accordion) -->
      <div class="form-section" style="margin-bottom: 16px;">
        <div id="customerSummaryToggle" style="display:flex; justify-content:space-between; align-items:center; background:var(--green-pale); padding:12px 14px; border-radius:12px; cursor:pointer; color:var(--green); border: 1px solid rgba(15,77,55,0.1);">
          <div style="display:flex; align-items:center; gap:8px;">
            <i data-lucide="user" class="w-4 h-4"></i>
            <span id="customerSummaryText" style="font-weight:700; font-size:14px;">Lengkapi Data Pengiriman</span>
          </div>
          <i data-lucide="chevron-down" id="customerSummaryIcon" style="transition: transform 0.3s;"></i>
        </div>

        <div id="customerFormFields" style="margin-top:12px; display:block;">
          <div class="form-section">
            <label class="form-label">Nama Penerima</label>
            <input type="text" id="customerName" placeholder="Nama lengkap" autocomplete="name" />
          </div>
          <div class="form-section">
            <label class="form-label">Nomor HP</label>
            <input type="tel" id="customerPhone" placeholder="08xxxxxxxxxx" autocomplete="tel" />
          </div>
          <div class="form-section">
            <label class="form-label">Alamat Pengiriman</label>
            <textarea id="customerAddress" placeholder="Alamat lengkap (jalan, kecamatan, kota)" rows="2" autocomplete="street-address"></textarea>
          </div>
          <div class="form-section">
            <label class="form-label">Catatan Pesanan (Opsional)</label>
            <textarea id="orderNotes" placeholder="Contoh: Sambal dipisah, untuk kado..." rows="2"></textarea>
          </div>
          <button type="button" class="wa-btn" id="btnSaveCustomer" style="padding:10px; font-size:13px; border-radius:10px; justify-content:center;">Simpan & Lipat Data</button>
        </div>
      </div>

      <!-- 2. Waktu Pengiriman -->
      <div class="form-section" style="border-top: 1px dashed var(--gray-200); padding-top: 16px;">
        <label class="form-label">Waktu Pengiriman</label>
        <div class="shipping-method-row">
          <button type="button" class="method-btn active" id="btnWaktuSekarang">Kirim Segera</button>
          <button type="button" class="method-btn" id="btnWaktuPO">Terjadwal (PO)</button>
        </div>
        <div id="poScheduleWrap" style="display:none; margin-top:8px; gap:8px;">
          <input type="date" id="poDate" style="flex:1; padding: 8px; border-radius: 8px; border: 1px solid var(--gray-200);" />
          <input type="time" id="poTime" style="flex:1; padding: 8px; border-radius: 8px; border: 1px solid var(--gray-200);" />
        </div>
      </div>

      <!-- 3. Pemesanan Kurir (Pembeli vs RujakCo) -->
      <div class="form-section" style="margin-top: 16px; border-top: 1px dashed var(--gray-200); padding-top: 16px;">
        <label class="form-label">Siapa yang memesan kurir?</label>
        <div class="shipping-method-row">
          <button type="button" class="method-btn active" id="btnOrderPembeli">Dipesan Pembeli</button>
          <button type="button" class="method-btn" id="btnOrderRujakCo">Dipesan Rujak.Co</button>
        </div>

        <!-- Info Jika Dipesan Pembeli -->
        <div id="pembeliShippingWrap" style="margin-top:12px; background:var(--green-pale); padding:10px 12px; border-radius:10px; font-size:12px; color:var(--green); font-weight:600; line-height: 1.5;">
          📌 Anda memesan kurir sendiri (Grab/Gojek/Lalamove) ke titik jemput Rujak.Co Bekasi setelah pesanan dikonfirmasi siap.
        </div>

        <!-- Opsi Jika Dipesan RujakCo -->
        <div id="rujakCoShippingWrap" style="display:none; margin-top:16px;">
          <div class="form-section" id="courierSection">
            <label class="form-label">Estimasi Ongkir & Kurir</label>
            <select id="courierSelect" style="font-weight:700; color:var(--green); cursor:pointer; background-color: var(--green-pale);">
              <option value="">Menghitung jarak...</option>
            </select>
          </div>

          <div class="form-section" style="margin-top: 12px;">
            <label class="form-label">Metode Pembayaran Ongkir</label>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; font-weight:600; color:var(--gray-700);">
                <input type="radio" name="paymentMethod" id="payBayarKurir" checked />
                💵 Bayar ke Kurir (Di Tempat)
              </label>
              <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px; font-weight:600; color:var(--gray-700);">
                <input type="radio" name="paymentMethod" id="payGabungQRIS" />
                📲 Digabung ke Tagihan QRIS
              </label>
            </div>
            <div id="ongkirWarning" style="background:#fee2e2; color:#991b1b; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:600; margin-top:8px;">
              ⚠️ Ongkir dibayar terpisah ke kurir. Total QRIS <strong>tidak termasuk</strong> ongkir.
            </div>
          </div>
        </div>
      </div>
