<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rujak.Co</title>
  <meta name="theme-color" content="#FCFAF8" />
  <link rel="icon" type="image/webp" href="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script defer src="https://unpkg.com/lucide@0.383.0"></script>
</head>
<body>
  
  <div id="onboardingOverlay" class="onboarding-overlay">
    <div class="onb-content">
      <img src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" alt="Rujak.Co" class="onb-logo">
      <div id="onbNewUser" style="display:none; width:100%;">
        <h2 class="onb-title">Rujak.Co</h2>
        <div id="onbStep1" class="onb-step active">
          <label class="onb-label">Siapa yang kami sapa hari ini?</label>
          <input type="text" id="onbName" class="onb-input" placeholder="Nama Anda" autocomplete="off">
          <button class="btn-gold full-width" id="onbNextBtn">Selanjutnya</button>
        </div>
        <div id="onbStep2" class="onb-step">
          <label class="onb-label">Area pengantaran</label>
          <div style="position:relative;"><input type="text" id="onbDistrict" class="onb-input" placeholder="Kecamatan..." autocomplete="off"><div id="onbDistrictDropdown" class="minimal-dropdown"></div></div>
          <button class="btn-gold full-width" id="onbStartBtn" style="margin-top:24px;">Masuk</button>
        </div>
      </div>
      <div id="onbReturningUser" style="display:none; width:100%;">
        <p class="onb-welcome-text">Selamat Datang Kembali,</p>
        <h2 class="onb-title" id="onbWelcomeName">Klien</h2>
        <button class="btn-gold full-width" id="onbEnterBtn" style="margin-top:40px;">Masuk</button>
        <button class="btn-text-gold" id="onbResetBtn">Ubah Profil</button>
      </div>
    </div>
  </div>

  <div id="app">
    <header class="luxury-header">
      <div class="brand-logo"><img src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" alt="Rujak.Co"></div>
      <div class="header-center"><h1 class="brand-name">Rujak.Co</h1></div>
      <div style="width:36px;"></div>
    </header>

    <main class="content-wrapper" id="mainContent">
      <div class="hero-editorial fade-up">
        <div class="hero-img-wrap"><img class="hero-img" src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/Banner.webp" alt="Sajian Rujak" /></div>
        <div class="hero-overlay"><h2>Tidak ada buah yang<br><em>menunggu pembeli.</em></h2><p>Disiapkan seketika setelah Anda memesan.</p></div>
      </div>
      <div class="carousel-container fade-up"><div class="carousel-track" id="menuList"></div></div>
      <footer class="luxury-footer fade-up"><img src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" alt="Rujak.Co"><p>RUJAK.CO &nbsp;•&nbsp; BEKASI, INDONESIA</p></footer>
    </main>

    <div class="product-swiper-overlay" id="productPage" style="display:none;">
      <button id="backFromProduct" class="glass-btn floating-close"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
      <div class="product-swiper-track" id="productSwiperTrack"></div>
    </div>

    <div class="modal-overlay" id="miniCartModal">
      <div class="drawer-content">
        <div class="drawer-header"><h3>Tas Belanja</h3><button id="miniCartClose" class="glass-btn-dark"><i data-lucide="x" class="w-4 h-4"></i></button></div>
        <div class="drawer-body">
          <div id="miniCartList"></div>
          <div class="drawer-subtotal"><span>Subtotal</span><span id="cartSubtotalDisplay" class="font-fraunces">Rp0</span></div>
          <div class="checkout-forms">
            <h4>Pengiriman</h4>
            <input type="text" id="customerName" placeholder="Nama" class="input-minimal">
            <input type="tel" id="customerPhone" placeholder="Telepon" class="input-minimal">
            <textarea id="customerAddress" placeholder="Alamat detail" rows="2" class="input-minimal"></textarea>
            <input type="text" id="districtInput" class="input-minimal" readonly>
            <select id="deliveryTime" class="input-minimal"><option value="Pagi">Pagi</option><option value="Siang">Siang</option><option value="Sore">Sore</option></select>
          </div>
          <div class="drawer-total"><span>Total</span><span id="finalTotal">Rp0</span></div>
          <button class="btn-dark full-width" id="btnOpenPayment">Lanjutkan Pembayaran</button>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
      <a href="#" class="nav-item active"><i data-lucide="home"></i></a>
      <a href="#" class="nav-item" id="navCartBtn"><i data-lucide="shopping-bag"></i><span class="nav-badge" id="cartBadgeNav" style="display:none;"></span></a>
      <a href="#" class="nav-item" id="aiChatToggle"><i data-lucide="message-square"></i></a>
    </nav>
    <div id="toast"></div>
  </div>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="app.js"></script>
</body>
</html>
