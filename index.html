  <style>
    /* =========================================
       1. TOKENS & RESET (Dioptimalkan)
       ========================================= */
    :root {
      --space-1: 8px; --space-2: 16px; --space-3: 24px; --space-4: 32px;
      --space-5: 40px; --space-6: 48px; --space-7: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: rgba(0,0,0,0.08); margin: 0; padding: 0; }
    html, body { 
      background-color: #082E21; font-family: 'DM Sans', sans-serif; 
      font-size: 16px; color: #FDFBF7; -webkit-font-smoothing: antialiased; 
    }
    #app { position: relative; width: 100%; max-width: 480px; min-height: 100dvh; margin: 0 auto; overflow-x: hidden; }
    h1, h2, h3, h4 { font-family: 'Fraunces', serif; font-weight: 350; margin-bottom: var(--space-2); }
    h2 { font-size: clamp(1.5rem, 5vw, 1.75rem); }
    h3 { font-size: clamp(1.25rem, 4vw, 1.5rem); }
    h4 { font-size: clamp(1.125rem, 3.5vw, 1.25rem); }

    /* =========================================
       2. ONBOARDING (Grid 8pt)
       ========================================= */
    .onboarding-overlay {
      position: fixed; inset: 0; z-index: 1100; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: var(--space-6) var(--space-3); text-align: center;
      background: radial-gradient(circle at 50% 30%, rgba(183,146,79,0.08), transparent 60%), linear-gradient(180deg, #082E21, #020A07);
    }
    /* Dimensi logo disesuaikan ke 80px */
    .onb-logo { width: 80px; height: 80px; margin-bottom: var(--space-3); padding: 8px; background: rgba(0,0,0,0.15); border: 1px solid rgba(183,146,79,0.3); border-radius: 50%; }
    .onb-title { font-size: 2.1rem; line-height: 1.1; color: #FDFBF7; min-height: 56px; display: flex; align-items: center; justify-content: center; margin-bottom: var(--space-1); }
    .onb-subtitle, .onb-welcome-text { font-size: 0.65rem; font-weight: 600; color: #E8D5A8; text-transform: uppercase; letter-spacing: 0.25em; min-height: 16px; margin-bottom: var(--space-4); }
    
    /* Input dioptimalkan untuk sentuhan & proksimitas */
    .onb-label { display: block; margin-bottom: var(--space-1); font-size: 0.75rem; font-weight: 600; color: rgba(253,251,247,0.85); text-transform: uppercase; letter-spacing: 0.15em; }
    .onb-input { width: 100%; margin-bottom: var(--space-3); padding: var(--space-2); background: rgba(2,10,7,0.3); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; font-family: 'Fraunces', serif; font-size: 1.5rem; color: #FDFBF7; text-align: center; outline: none; transition: border-color 0.3s; }
    .onb-input:focus { border-color: #A67C3D; }
    .onb-input::placeholder { font-family: 'DM Sans', sans-serif; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(253,251,247,0.35); }

    /* =========================================
       3. BUTTONS (Hukum Fitts - Sentuhan Ideal)
       ========================================= */
    .btn-gold, .btn-dark {
      display: flex; align-items: center; justify-content: center; width: 100%;
      min-height: 56px; /* Touch target superior */
      padding: 0 var(--space-4); border: none; border-radius: 12px;
      font-size: 0.875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; cursor: pointer;
    }
    .btn-gold { background: #A67C3D; color: white; }
    .btn-dark { background: #082E21; border: 1px solid #C9A868; color: #FDFBF7; }
    .btn-text-gold { margin-top: var(--space-3); background: none; border: none; font-size: 0.75rem; font-weight: 600; color: #E8D5A8; text-transform: uppercase; letter-spacing: 0.15em; min-height: 44px; cursor: pointer; }
    .glass-btn-dark { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: rgba(246,244,240,0.1); border: none; border-radius: 50%; color: #FDFBF7; cursor: pointer; }

    /* =========================================
       4. HEADER & NAV (Aksesibilitas & Spasi)
       ========================================= */
    .luxury-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
      max-width: 480px; margin: 0 auto; padding: 12px var(--space-2);
      background: linear-gradient(180deg, rgba(2,10,7,0.75), rgba(8,46,33,0.55) 70%, transparent);
    }
    .header-left { display: flex; align-items: center; gap: var(--space-1); background: none; border: none; min-height: 44px; cursor: pointer; color: inherit; }
    .brand-logo img { width: 32px; height: 32px; border-radius: 50%; }
    .brand-name { font-size: 1rem; font-weight: 600; color: white; }

    .bottom-nav {
      position: fixed; right: 0; bottom: 0; left: 0; z-index: 600; display: flex; justify-content: space-around;
      max-width: 480px; margin: 0 auto; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      background: rgba(5,28,20,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(183,146,79,0.2); border-radius: 16px 16px 0 0;
    }
    /* Peningkatan rasio kontras untuk item non-aktif */
    .nav-item { display: flex; flex: 1; flex-direction: column; align-items: center; justify-content: center; min-height: 48px; background: none; border: none; color: rgba(255,255,255,0.6); font-size: 0.7rem; font-weight: 600; cursor: pointer; }
    .nav-item.active { color: #A67C3D; }

    /* =========================================
       5. FORMS / CHECKOUT (Proksimitas Gestalt)
       ========================================= */
    .checkout-forms { margin-top: var(--space-3); padding: var(--space-3); background: white; border: 1px dashed rgba(183,146,79,0.3); border-radius: 8px; color: #1A1816; }
    .checkout-forms h4 { margin-bottom: var(--space-3); color: #082E21; font-size: 1.125rem; }
    
    /* Pengelompokan field form */
    .form-group { margin-bottom: var(--space-3); }
    .tiny-text { display: block; margin-bottom: 8px; font-size: 0.75rem; font-weight: 600; color: #6E6C67; }
    .input-minimal { width: 100%; padding: 12px 0; background: transparent; border: none; border-bottom: 1px solid #D1CFCA; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; outline: none; }
    .input-minimal:focus { border-bottom-color: #A67C3D; }

    /* =========================================
       6. HERO & CAROUSEL
       ========================================= */
    .content-wrapper { padding-bottom: 120px; }
    .hero-gold-frame { margin: 64px var(--space-2) 0; border-radius: 20px; }
    .hero-img-wrap { position: relative; overflow: hidden; aspect-ratio: 16/9; background: #051C14; border-radius: 20px; }
    .hero-img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .hero-overlay-new { position: absolute; inset: auto 0 0 0; padding: var(--space-4) var(--space-3) var(--space-3); background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); }
    .hero-title { font-size: clamp(1.4rem, 5vw, 1.85rem); line-height: 1.1; color: white; margin-bottom: var(--space-1); }
    .hero-title-em { color: #E8D5A8; font-style: italic; }
    .hero-subtitle { font-size: 0.75rem; font-weight: 500; color: rgba(255,255,255,0.9); text-transform: uppercase; letter-spacing: 0.1em; }

    .carousel-container { position: relative; width: 100%; margin-top: var(--space-3); }
    .carousel-track { display: flex; overflow-x: auto; padding: var(--space-5) var(--space-2) var(--space-4); scroll-snap-type: x mandatory; scrollbar-width: none; min-height: 440px; }
    .skeleton-card { flex: 0 0 100%; max-width: 440px; margin: 0 -12px; padding: var(--space-4); background: white; border-radius: 24px; text-align: center; display: flex; flex-direction: column; align-items: center; }
    .skeleton-img { width: 100%; aspect-ratio: 1/1; background: #E6E4DF; border-radius: 16px; overflow: hidden; }

    /* =========================================
       7. UTILS
       ========================================= */
    .full-width { width: 100%; }
    .fade-up { opacity: 0; transform: translateY(32px); transition: opacity 0.8s, transform 0.8s; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }
  </style>

  <script src="https://unpkg.com/lucide@0.378.0/dist/umd/lucide.min.js" defer></script>
</head>
<body>
<div id="app">
  
  <!-- ONBOARDING -->
  <div class="onboarding-overlay" id="onboardingOverlay" role="dialog" aria-modal="true" aria-labelledby="onbTitle">
    <div class="onb-content full-width" style="max-width: 320px;">
      <img class="onb-logo" src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" alt="RUJAK.Co" width="80" height="80" loading="lazy" />
      <div id="onbNewUser" style="display:block; width:100%;">
        <h2 class="onb-title" id="onbTitle">Selamat Datang</h2>
        <p class="onb-subtitle">Nikmati keistimewaan rasa Nusantara.</p>
        
        <div id="onbStep1" class="onb-step active">
          <label class="onb-label" for="onbName">Bolehkah kami mengenal Anda?</label>
          <input type="text" id="onbName" class="onb-input" placeholder="Nama lengkap" autocomplete="name" maxlength="30" required />
          <button type="button" class="btn-gold full-width" id="onbNextBtn">Lanjutkan</button>
          <button type="button" class="btn-text-gold full-width" id="onbGuestBtn">Intip Menu Dulu</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="luxury-header" id="mainHeader">
    <button type="button" class="header-left" id="aboutTrigger" aria-label="Tentang RUJAK.Co">
      <div class="brand-logo"><img src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/logo.webp" alt="Logo" width="32" height="32" /></div>
      <span class="brand-name">RUJAK.Co</span>
    </button>
    <div class="header-right" style="text-align: right;">
      <span class="user-name" id="headerNameDisplay" style="display:block; font-size:0.875rem; font-weight:700;">Tamu</span>
      <span class="user-loc" id="headerLocDisplay" style="display:block; font-size:0.7rem; opacity:0.8;">Bekasi</span>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="content-wrapper" id="mainContent">
    <div class="hero-editorial fade-up visible">
      <div class="hero-gold-frame">
        <div class="hero-img-wrap">
          <img class="hero-img" src="https://dk1tnyskaoive0dn.public.blob.vercel-storage.com/Banner.webp" alt="Rujak premium RUJAK.Co" width="480" height="270" fetchpriority="high" decoding="async" />
          <div class="hero-overlay-new">
            <h1 class="hero-title">Asam, Pedas,<br> Manis, <span class="hero-title-em">Segar.</span></h1>
            <p class="hero-subtitle">Indonesia dalam Satu Wadah</p>
          </div>
        </div>
      </div>
    </div>
    
    <div class="carousel-container fade-up visible">
      <div class="carousel-track" id="menuList">
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div style="height:16px; width:60%; background:#E6E4DF; border-radius:4px; margin:24px auto 8px;"></div>
          <div style="height:16px; width:40%; background:#E6E4DF; border-radius:4px; margin:0 auto;"></div>
        </div>
      </div>
    </div>
    
    <!-- CONTOH CHECKOUT FORM (Prinsip Gestalt Proksimitas) -->
    <div style="padding: 0 var(--space-2);">
        <div class="checkout-forms">
          <h4>Data Penerima</h4>
          
          <div class="form-group">
              <label class="tiny-text" for="customerName">Nama Lengkap</label>
              <input type="text" id="customerName" class="input-minimal" placeholder="Nama lengkap penerima" required />
          </div>
          
          <div class="form-group">
              <label class="tiny-text" for="customerPhone">Nomor HP (WhatsApp)</label>
              <input type="tel" id="customerPhone" inputmode="numeric" class="input-minimal" placeholder="Contoh: 08123..." required />
          </div>
          
          <div class="form-group">
              <label class="tiny-text" for="customerAddress">Detail Alamat</label>
              <textarea id="customerAddress" placeholder="Blok, No. Rumah, atau patokan khusus" rows="2" class="input-minimal" required></textarea>
          </div>
        </div>
    </div>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottomNav">
    <button type="button" class="nav-item active" id="navHomeBtn" aria-label="Beranda"><i data-lucide="home" class="nav-icon" style="width:20px;height:20px;"></i></button>
    <button type="button" class="nav-item" id="navCartBtn" aria-label="Reservasi">
      <span class="nav-cart-wrapper"><i data-lucide="shopping-bag" class="nav-icon" style="width:20px;height:20px;"></i></span>
    </button>
    <button type="button" class="nav-item" id="navProductBtn" aria-label="Lihat Produk"><i data-lucide="utensils" class="nav-icon" style="width:20px;height:20px;"></i></button>
    <button type="button" class="nav-item" id="aiChatToggle" aria-label="Concierge"><i data-lucide="sparkles" class="nav-icon" style="width:20px;height:20px;"></i></button>
  </nav>

</div>
</body>
